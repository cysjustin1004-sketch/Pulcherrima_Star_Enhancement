<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>별 강화하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Sora:wght@700;900&family=Hanken+Grotesk:wght@400;500;700;900&family=Geist:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ───────────────── 상단 헤더 ───────────────── -->
<div class="top-header">
  <div class="top-header-brand">
    <div class="top-header-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L14.4 9.2L22 12L14.4 14.8L12 22L9.6 14.8L2 12L9.6 9.2L12 2Z" fill="black"/>
      </svg>
    </div>
    <div class="top-header-title">별 강화하기</div>
  </div>
  <button class="top-header-logout" id="btn-logout">🚪 로그아웃</button>
</div>

<!-- ───────────────── 강화 결과 오버레이 ───────────────── -->
<div class="result-overlay" id="result-overlay">
  <div class="result-title" id="result-title"></div>
  <div class="result-desc"  id="result-desc"></div>

  <!-- 드랍 줍기 버튼 (실패 후 드랍 아이템 있을 때만 표시) -->
  <div id="pickup-section" style="display:none; width:100%; max-width:280px;">
    <div style="font-size:0.85rem; color:var(--text-sub); margin-bottom:0.5rem;">
      드랍 아이템이 떨어졌습니다! 지금 줍지 않으면 사라집니다.
    </div>
    <button class="btn-blue" id="btn-pickup" style="width:100%"></button>
  </div>

  <!-- 방지권 선택 (실패 후 하락 위기일 때만 표시) -->
  <div id="protection-section" style="display:none; width:100%; max-width:280px;">
    <div style="font-size:0.85rem; color:var(--text-sub); margin-bottom:0.5rem;" id="protection-desc"></div>
    <div class="result-actions">
      <button class="btn-success" id="btn-use-protection">붕괴 방지권 사용</button>
      <button class="btn-danger"  id="btn-skip-protection">확인 (0강부터 시작)</button>
    </div>
  </div>

  <!-- 확인 버튼 (최종 단계) -->
  <div id="confirm-section" style="display:none; width:100%; max-width:280px;">
    <button class="btn-primary" id="btn-confirm">확인</button>
  </div>
</div>

<!-- ───────────────── 메인 콘텐츠 ───────────────── -->
<div class="page" id="main-page">

  <!-- 상태 바 -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-label">닉네임</div>
      <div class="status-value" id="stat-nickname" style="font-size:0.85rem; color:var(--text);">...</div>
    </div>
    <div class="status-item">
      <div class="status-label">수소 💧</div>
      <div class="status-value" id="stat-hydrogen">-</div>
    </div>
    <div class="status-item">
      <div class="status-label">방지권 🛡</div>
      <div class="status-value" id="stat-protection">-</div>
    </div>
  </div>

  <!-- 별 시각화 -->
  <div class="star-display">
    <div class="star-level" id="star-level-text">+0강</div>
    <div class="star-name"  id="star-name">오리온 성운</div>
    <div class="star-subname" id="star-subname">M42</div>

    <div class="star-visual">
      <img class="star-img" id="star-core" src="images/star_0.png" alt="">
    </div>

    <div class="star-type-badge" id="star-type-badge">성간 가스 구름</div>
    <div id="star-material-note" style="display:none; font-size:0.75rem; color:var(--text-sub); margin-top:0.4rem; text-align:center;"></div>
  </div>

  <!-- 강화 정보 카드 -->
  <div class="card" id="enhance-info-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
      <span style="font-size:0.8rem; color:var(--text-sub); font-weight:700; text-transform:uppercase; letter-spacing:0.07em;">강화 정보</span>
      <span style="font-size:0.8rem; color:var(--text-sub);">다음: <span id="next-star-name" style="color:var(--accent);">-</span></span>
    </div>

    <!-- 성공 확률 -->
    <div style="display:flex; justify-content:space-between; font-size:0.88rem; margin-bottom:0.4rem;">
      <span style="color:var(--text-sub);">성공 확률</span>
      <span style="color:var(--success); font-weight:700;" id="success-rate-text">-</span>
    </div>
    <div class="rate-bar">
      <div class="rate-fill" id="rate-fill" style="width:0%; background:var(--success);"></div>
    </div>

    <!-- 비용 -->
    <div style="display:flex; justify-content:space-between; font-size:0.88rem; margin-top:0.75rem;">
      <span style="color:var(--text-sub);">강화 비용</span>
      <span style="font-weight:700;" id="cost-text">-</span>
    </div>

    <!-- 방지권 정보 -->
    <div style="display:flex; justify-content:space-between; font-size:0.82rem; margin-top:0.4rem;" id="protection-info-row">
      <span style="color:var(--text-sub);">방지권</span>
      <span id="protection-cost-text" style="color:var(--text-sub);">-</span>
    </div>
  </div>

  <!-- +29 달성 메시지 (평소 숨김) -->
  <div class="card" id="legend-card" style="display:none; text-align:center;">
    <div style="font-size:2rem; margin-bottom:0.5rem;">✨</div>
    <div style="font-size:1.1rem; font-weight:700; color:var(--accent); margin-bottom:0.4rem;">우주 도달!</div>
    <div style="font-size:0.85rem; color:var(--text-sub);">별 하나에서 시작해 은하, 은하군, 은하단, 초은하단을 지나 마침내 우주 그 자체에 도달했습니다. 전설의 경지에 올랐습니다.</div>
  </div>

  <!-- 강화 버튼 영역 -->
  <div class="enhance-section" id="enhance-section">
    <button class="btn-enhance" id="btn-enhance">⚡ 강화하기</button>

    <!-- 별 보관 버튼 (보관 가능한 별에서만 표시) -->
    <button class="btn-outline" id="btn-store" style="display:none;">📦 별 보관하기</button>

    <!-- 액션 행: 0강=아이템창+상점 / 1강+=조합소+판매하기 -->
    <div class="action-row">
      <button class="btn-secondary" id="btn-left"  onclick="location.href='combine.html'">조합소</button>
      <button class="btn-secondary" id="btn-right" onclick="location.href='shop.html'">상점</button>
    </div>
  </div>

</div><!-- /.page -->

    <span class="nav-icon">💬</span>메시지
  </a>

  </a>
</nav>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="game.js"></script>
<script>
// ───────────────────────────────────────────────────
// index.html 전용 스크립트 — UI 제어 + 강화 흐름
// ───────────────────────────────────────────────────

// 세션 확인
const session = requireAuth();
if (!session) throw new Error('no session');

// 전역 상태
let currentUser = null;
// 실패 흐름 추적 (서버 pendingFailure 결과 기반)
let pendingState = {
  failed:       false,
  drop:         null,  // 서버에서 반환한 드랍 정보 { key, amount }
  dropPickedUp: false,
  failedLevel:  0,     // 강화 실패한 단계 (방지권 비용 계산에 사용)
};

// ─── UI 업데이트 ────────────────────────────────────

function updateUI(user) {
  currentUser = user;
  const level = user.currentStar || 0;
  const stage = resolveStage(level, user.track);

  // 상태 바
  document.getElementById('stat-nickname').textContent = user.nickname;
  document.getElementById('stat-hydrogen').textContent  = formatNumber(user.hydrogen || 0);
  document.getElementById('stat-protection').textContent = user.protectionScrolls || 0;

  // 별 표시
  document.getElementById('star-level-text').textContent = `+${level}강`;
  document.getElementById('star-name').textContent        = stage.name;
  document.getElementById('star-subname').textContent     = stage.subname;
  document.getElementById('star-type-badge').textContent  = stage.type;

  const coreEl = document.getElementById('star-core');
  coreEl.src = starImagePath(level, user.track);

  // 강화 재료 안내 (이 별이 상위 강화의 별 재료로 쓰이는 경우에만 표시)
  const materialUsage = starMaterialUsage(level, user.track);
  const materialNote = document.getElementById('star-material-note');
  if (materialUsage.length) {
    materialNote.textContent = `이 별은 ${materialUsage[0]} 강화 재료로 사용됩니다.`;
    materialNote.style.display = '';
  } else {
    materialNote.style.display = 'none';
  }

  // 강화 정보
  if (stage.cost === null) {
    // 트랙 최종 단계: 전설 달성, 강화 불가
    document.getElementById('enhance-section').style.display  = 'none';
    document.getElementById('enhance-info-card').style.display = 'none';
    document.getElementById('legend-card').style.display      = '';
    return;
  }

  document.getElementById('enhance-section').style.display  = '';
  document.getElementById('enhance-info-card').style.display = '';
  document.getElementById('legend-card').style.display      = 'none';

  // 다음 단계 이름 (16→17은 트랙이 무작위 배정되므로 이름을 미리 알 수 없음)
  if (level === 16) {
    document.getElementById('next-star-name').textContent = '??? (무작위 트랙 배정)';
  } else {
    const nextStage = resolveStage(level + 1, user.track);
    document.getElementById('next-star-name').textContent = nextStage ? nextStage.name : '-';
  }

  // 성공 확률
  const rate = Math.round(stage.successRate * 100);
  document.getElementById('success-rate-text').textContent = `${rate}%`;
  document.getElementById('rate-fill').style.width = `${rate}%`;
  // 확률에 따른 색상
  const rateFill = document.getElementById('rate-fill');
  if (rate >= 70)      rateFill.style.background = 'var(--success)';
  else if (rate >= 40) rateFill.style.background = 'var(--accent)';
  else                 rateFill.style.background = 'var(--danger)';

  // 강화 비용 (formatCost가 <span> HTML 반환)
  document.getElementById('cost-text').innerHTML = formatCost(stage.cost, user);

  // 방지권 정보
  const protRow = document.getElementById('protection-info-row');
  const protText = document.getElementById('protection-cost-text');
  if (level <= 3) {
    protText.textContent = '하락 없음';
    protText.style.color = 'var(--success)';
  } else if (stage.protectionCost === -1) {
    protText.textContent = '방지 불가';
    protText.style.color = 'var(--danger)';
  } else if (stage.protectionCost > 0) {
    protText.textContent = `방지권 ${stage.protectionCost}개 필요 (보유: ${user.protectionScrolls || 0})`;
    protText.style.color = 'var(--text-sub)';
  } else {
    protText.textContent = '-';
    protText.style.color = 'var(--text-sub)';
  }

  // 별 보관 버튼 (+1강 이상이면 보관 가능)
  const btnStore = document.getElementById('btn-store');
  btnStore.style.display = level >= 1 ? '' : 'none';

  // 액션 행: 0강=아이템창+상점 / 1강+=조합소+판매
  const btnLeft  = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  if (level === 0) {
    btnLeft.textContent  = '아이템창';
    btnLeft.onclick      = () => location.href = 'combine.html';
    btnRight.textContent = '상점';
    btnRight.onclick     = () => location.href = 'shop.html';
  } else {
    btnLeft.textContent  = '조합소';
    btnLeft.onclick      = () => location.href = 'combine.html';
    btnRight.textContent = `판매 (${formatNumber(stage.sellPrice || 0)} 수소)`;
    btnRight.onclick     = handleSell;
    // 판매 불가 시 비활성화 (+28)
    btnRight.disabled    = !stage.sellPrice;
  }

  // 강화 버튼 텍스트
  document.getElementById('btn-enhance').textContent = '⚡ 강화하기';
  document.getElementById('btn-enhance').disabled    = !canAffordCost(stage.cost, user);
}

/** 비용을 사람이 읽기 좋은 문자열로 변환 */
function formatCost(cost, user) {
  if (!cost) return '-';
  if (cost.type === 'hydrogen') {
    if (cost.amount === 0) return '무료';
    const enough = (user.hydrogen || 0) >= cost.amount;
    const color   = enough ? 'var(--success)' : 'var(--danger)';
    return `<span style="color:${color}">${formatNumber(cost.amount)} 수소</span>`;
  }
  if (cost.type === 'item') {
    const held    = (user.items && user.items[cost.key]) || 0;
    const enough  = held >= cost.amount;
    const color   = enough ? 'var(--success)' : 'var(--danger)';
    return `<span style="color:${color}">${ITEM_NAMES[cost.key]} ${cost.amount}개 (보유: ${held})</span>`;
  }
  if (cost.type === 'star') {
    const key     = stageKey(cost.level, user.track);
    const stored  = (user.storedStars && user.storedStars[key]) || 0;
    const enough  = stored >= cost.amount;
    const color   = enough ? 'var(--success)' : 'var(--danger)';
    const stage   = resolveStage(cost.level, user.track);
    const name    = stage ? stage.name : `+${cost.level}강 별`;
    return `<span style="color:${color}">${name} ${cost.amount}개 (보유: ${stored})</span>`;
  }
  return '-';
}

/** 비용을 감당할 수 있는지 확인 */
function canAffordCost(cost, user) {
  if (!cost) return false;
  if (cost.type === 'hydrogen') return (user.hydrogen || 0) >= cost.amount;
  if (cost.type === 'item')     return ((user.items && user.items[cost.key]) || 0) >= cost.amount;
  if (cost.type === 'star') {
    const key = stageKey(cost.level, user.track);
    return ((user.storedStars && user.storedStars[key]) || 0) >= cost.amount;
  }
  return false;
}

// ─── 오버레이 제어 ─────────────────────────────────

function showOverlay(titleText, titleClass, descText) {
  const overlay = document.getElementById('result-overlay');
  document.getElementById('result-title').textContent = titleText;
  document.getElementById('result-title').className   = 'result-title ' + (titleClass || '');
  document.getElementById('result-desc').textContent  = descText || '';
  document.getElementById('pickup-section').style.display     = 'none';
  document.getElementById('protection-section').style.display = 'none';
  document.getElementById('confirm-section').style.display    = 'none';
  overlay.classList.add('visible');
}

function hideOverlay() {
  document.getElementById('result-overlay').classList.remove('visible');
}

function showConfirmButton() {
  document.getElementById('confirm-section').style.display = '';
}

// ─── 강화 흐름 ─────────────────────────────────────

document.getElementById('btn-enhance').addEventListener('click', async () => {
  if (!currentUser) return;
  const btn = document.getElementById('btn-enhance');
  btn.disabled = true;

  const level = currentUser.currentStar;
  const stage = resolveStage(level, currentUser.track);

  // 서버 API 호출 (인증 + 판정 + Firebase 쓰기를 서버에서 처리)
  const result = await enhance();

  if (!result.ok) {
    btn.disabled = false;
    showOverlay('⚠️ 주의', '', result.error || '오류가 발생했습니다.');
    showConfirmButton();
    document.getElementById('btn-confirm').onclick = async () => {
      hideOverlay();
      btn.disabled = false;
    };
    return;
  }

  if (result.success) {
    // 성공: 서버가 currentStar 증가시킴 — 로컬 상태에도 즉시 반영 (재조회 불필요)
    const newLevel = result.level + 1;
    // 비용을 로컬에서도 차감 (UI 갱신용) — 차감은 항상 강화 직전 트랙 기준
    if (stage.cost) {
      if (stage.cost.type === 'hydrogen') currentUser.hydrogen = Math.max(0, (currentUser.hydrogen || 0) - stage.cost.amount);
      else if (stage.cost.type === 'item' && currentUser.items) currentUser.items[stage.cost.key] = Math.max(0, (currentUser.items[stage.cost.key] || 0) - stage.cost.amount);
      else if (stage.cost.type === 'star') {
        if (!currentUser.storedStars) currentUser.storedStars = {};
        const costKey = stageKey(stage.cost.level, currentUser.track);
        currentUser.storedStars[costKey] = Math.max(0, (currentUser.storedStars[costKey] || 0) - stage.cost.amount);
      }
    }
    if (result.assignedTrack) currentUser.track = result.assignedTrack;
    currentUser.currentStar = newLevel;
    if (newLevel > (currentUser.bestStar || 0)) currentUser.bestStar = newLevel;
    const unlockKey = stageKey(newLevel, currentUser.track);
    const unlocked = currentUser.unlockedCodex || [];
    if (!unlocked.includes(unlockKey)) currentUser.unlockedCodex = [...unlocked, unlockKey];
    updateUI(currentUser);
    btn.disabled = false;
    if (result.assignedTrack) {
      showToast(`${TRACK_INFO[result.assignedTrack].name}에 진입했습니다!`);
    }
  } else {
    // 실패: 서버가 pendingFailure 저장. 드랍/방지권 흐름 시작
    pendingState = {
      failed:       true,
      drop:         result.drop,  // { key, amount } 또는 null
      dropPickedUp: false,
      failedLevel:  result.level,
    };
    advanceFailureFlow();
  }
});

/** 실패 후 방지권 선택 → 확인 순으로 진행 (드랍은 서버에서 자동 지급) */
async function advanceFailureFlow() {
  // 드랍 아이템은 서버에서 자동 지급됨 — 토스트로 알림만 표시
  if (pendingState.drop) {
    const drop = pendingState.drop;
    showToast(`${ITEM_NAMES[drop.key]} ${drop.amount}개를 획득했습니다.`);
  }

  // 방지권 선택 (4강 이상이고 방지 가능한 단계)
  const failedLevel = pendingState.failedLevel;
  const failedStage = resolveStage(failedLevel, currentUser.track);
  const needFallback = failedLevel >= 4; // 0~3강은 하락 없음
  const canProtect = failedStage.protectionCost > 0 && (currentUser.protectionScrolls || 0) >= failedStage.protectionCost;

  if (needFallback) {
    if (canProtect) {
      // 방지권을 쓸 수 있는 경우엔 실패 안내 없이 방지권 선택 창만 표시.
      // 버튼 클릭 한 번으로 바로 결정 → 오버레이 닫힘 (확인 단계 없음)
      showOverlay('🛡 방지권 선택', '', '');
      const protSection = document.getElementById('protection-section');
      document.getElementById('protection-desc').textContent =
        `${failedStage.name} (+${failedLevel}강) 강화에 실패했습니다. 방지권 ${failedStage.protectionCost}개를 사용하면 단계를 유지하고, 사용하지 않으면 0강부터 다시 시작합니다. (보유: ${currentUser.protectionScrolls || 0})`;
      protSection.style.display = '';

      document.getElementById('btn-use-protection').onclick = async () => {
        const res = await useProtectionScroll();
        if (res.ok) {
          showToast(`방지권 ${failedStage.protectionCost}개 소모 — 단계 유지!`);
        } else {
          showToast(res.error || '방지 실패, 0강부터 다시 시작합니다.');
          await applyFallback();
        }
        hideOverlay();
        await reload();
        document.getElementById('btn-enhance').disabled = false;
      };

      document.getElementById('btn-skip-protection').onclick = async () => {
        await applyFallback();
        hideOverlay();
        await reload();
        document.getElementById('btn-enhance').disabled = false;
      };
      return;
    } else {
      // 방지권 없거나 방지 불가 단계 → 실패 안내 후 즉시 하락 처리
      showOverlay('💥 강화 실패', 'fail', `${failedStage.name} (+${failedLevel}강) 강화에 실패했습니다.`);
      await applyFallback();
    }
  } else {
    // 하락 없는 구간(0~3강) → 실패 안내만 표시
    showOverlay('💥 강화 실패', 'fail', `${failedStage.name} (+${failedLevel}강) 강화에 실패했습니다.`);
  }

  // 3단계: 확인 버튼
  showConfirmButton();
  document.getElementById('btn-confirm').onclick = async () => {
    hideOverlay();
    await reload();
    document.getElementById('btn-enhance').disabled = false;
  };
}

// ─── 판매 ──────────────────────────────────────────

async function handleSell() {
  if (!currentUser) return;
  const stage = resolveStage(currentUser.currentStar, currentUser.track);
  if (!stage || !stage.sellPrice) return;

  if (!confirm(`+${currentUser.currentStar}강 별(${stage.name})을 ${formatNumber(stage.sellPrice)} 수소에 판매하시겠습니까?`)) return;

  const result = await sellStar();
  if (result.ok) {
    showToast(`${stage.name}을 ${formatNumber(result.gained)} 수소에 판매했습니다.`);
    await reload();
  } else {
    showToast(result.error || '판매 오류');
  }
}

// ─── 보관 ──────────────────────────────────────────

document.getElementById('btn-store').addEventListener('click', async () => {
  if (!currentUser) return;
  const level = currentUser.currentStar;
  if (level < 1) return;

  const stage = resolveStage(level, currentUser.track);
  if (!confirm(`+${level}강 별(${stage.name})을 보관하시겠습니까?\n보관된 별은 조합소에서 사용할 수 있습니다.`)) return;

  const result = await storeStar();
  if (result.ok) {
    showToast(`${stage.name}(+${level}강) 1개를 보관했습니다.`);
    await reload();
  } else {
    showToast(result.error || '보관 오류');
  }
});

// ─── 로그아웃 ──────────────────────────────────────

document.getElementById('btn-logout').addEventListener('click', (e) => {
  e.preventDefault();
  if (confirm('로그아웃하시겠습니까?')) {
    clearSession();
    location.href = 'login.html';
  }
});

// ─── 토스트 알림 ────────────────────────────────────

function showToast(msg) {
  // style.css에 .toast 정의 있음 — 동적 생성
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  // 강제 reflow 후 show
  requestAnimationFrame(() => {
    requestAnimationFrame(() => t.classList.add('show'));
  });
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 350);
  }, 2200);
}

// ─── 데이터 새로고침 ────────────────────────────────

async function reload() {
  const user = await loadCurrentUser();
  if (!user) {
    clearSession();
    location.href = 'login.html';
    return;
  }
  updateUI(user);
}

// ─── 배틀 결과 알림 (방어자로서 놓친 결과를 홈 진입 시 순차 토스트로 표시) ───

async function showBattleNotifications() {
  const res = await apiCall('/api/battle/notifications', {});
  if (!res.ok || !res.items || !res.items.length) return;

  for (const n of res.items) {
    const win = n.result === 'win';
    const msg = win
      ? `${n.opponentNick}님과의 배틀에서 승리! 수소 +${formatNumber(n.hydrogenDelta)}`
      : `${n.opponentNick}님에게 배틀에서 패배… 수소 -${formatNumber(-n.hydrogenDelta)}`;
    showToast(msg);
    await new Promise(r => setTimeout(r, 2400)); // 토스트가 겹치지 않게 순차 표시
  }
}

// ─── 초기 로드 ──────────────────────────────────────

(async () => {
  await reload();
  showBattleNotifications(); // 강화 흐름을 막지 않도록 결과를 기다리지 않음
})();
</script>
