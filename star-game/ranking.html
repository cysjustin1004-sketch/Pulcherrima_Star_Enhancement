<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>랭킹 — 별 강화하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <h1 class="page-title">🏆 랭킹</h1>

  <div class="tab-row">
    <button class="tab-btn active" id="tab-enhance">강화 랭킹</button>
    <button class="tab-btn" id="tab-battle">배틀 랭킹</button>
  </div>

  <div style="font-size:0.82rem; color:var(--text-sub); text-align:center; margin-bottom:1rem;" id="rank-sub">
    bestStar 기준 상위 50명
  </div>

  <div class="rank-list" id="rank-list">
    <div style="text-align:center; color:var(--text-sub); padding:2rem;">로딩 중...</div>
  </div>
</div>

<!-- ───────────────── 상대 프로필 모달 ───────────────── -->
<div class="codex-modal-bg" id="profile-modal-bg">
  <div class="codex-modal">
    <div class="codex-modal-level" id="profile-star-level"></div>
    <div class="codex-modal-name" id="profile-nickname"></div>
    <div class="codex-modal-sub" id="profile-star-name"></div>
    <div class="star-visual" style="margin:1rem auto;">
      <img class="star-img" id="profile-star-img" src="" alt="">
    </div>
    <div class="codex-modal-desc" id="profile-record" style="text-align:center;"></div>
    <div class="codex-modal-desc" id="profile-stats" style="text-align:center; color:var(--text-sub);"></div>
    <div id="profile-battle-note" style="text-align:center; font-size:0.82rem; color:var(--text-sub); display:none;">친구만 배틀할 수 있습니다.</div>
    <button class="btn-primary mt-1" id="btn-goto-battle">⚔ 배틀하러 가기</button>
    <button class="btn-secondary w-100 mt-05" id="profile-modal-close">닫기</button>
  </div>
</div>

<!-- 하단 네비게이션 -->
<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <span class="nav-icon">⭐</span>강화
  </a>
  <a class="nav-item" href="codex.html">
    <span class="nav-icon">📖</span>도감
  </a>
  <a class="nav-item active" href="ranking.html">
    <span class="nav-icon">🏆</span>랭킹
  </a>
  <a class="nav-item" href="messages.html">
    <span class="nav-icon">💬</span>메시지
  </a>
  <a class="nav-item" href="battle.html">
    <span class="nav-icon">⚔</span>배틀
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="game.js"></script>
<script>
const session = requireAuth();
if (!session) throw new Error('no session');

let currentMode = 'enhance'; // 'enhance' | 'battle'

async function renderRanking(mode) {
  const list = document.getElementById('rank-list');
  const sub  = document.getElementById('rank-sub');
  list.innerHTML = '<div style="text-align:center; color:var(--text-sub); padding:2rem;">로딩 중...</div>';
  sub.textContent = mode === 'battle' ? '배틀 승수 기준 상위 50명' : 'bestStar 기준 상위 50명';

  const orderField = mode === 'battle' ? 'battleWins' : 'bestStar';

  // Firebase: 내림차순 정렬을 위해 오름차순으로 상위 50명 쿼리 후 반전
  const snap = await firebase.database()
    .ref('users')
    .orderByChild(orderField)
    .limitToLast(50)
    .get();

  if (!snap.exists()) {
    list.innerHTML = '<div style="text-align:center; color:var(--text-sub); padding:2rem;">아직 랭킹 데이터가 없습니다.</div>';
    return;
  }

  const users = [];
  snap.forEach(child => {
    const d = child.val();
    if (d.banned) return;  // 벤 유저는 랭킹에서 제외
    if (d.isCheat) return; // 테스트/치트 계정은 랭킹에서 제외
    users.push({
      userKey:    child.key,
      nickname:   d.nickname,
      bestStar:   d.bestStar   || 0,
      bestTrack:  d.bestTrack  || null,
      battleWins: d.battleWins || 0,
    });
  });

  if (mode === 'battle') {
    users.sort((a, b) => b.battleWins - a.battleWins);
  } else {
    users.sort((a, b) => b.bestStar - a.bestStar);
  }

  list.innerHTML = '';
  users.forEach((u, i) => {
    const rank     = i + 1;
    const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';

    const item = document.createElement('div');
    item.className = 'rank-item';
    item.style.cursor = 'pointer';

    if (mode === 'battle') {
      item.innerHTML = `
        <div class="rank-num">${rankIcon || rank}</div>
        <div class="rank-info">
          <div class="rank-nickname">${escapeHtml(u.nickname)}</div>
          <div class="rank-star">${u.battleWins}승</div>
        </div>
        <div class="rank-level">${u.battleWins}🏅</div>
      `;
    } else {
      const stage = resolveStage(u.bestStar, u.bestTrack) || COMMON_STAGES[0];
      item.innerHTML = `
        <div class="rank-num">${rankIcon || rank}</div>
        <div class="rank-info">
          <div class="rank-nickname">${escapeHtml(u.nickname)}</div>
          <div class="rank-star">+${u.bestStar}강 · ${stage.name}</div>
        </div>
        <div class="rank-level">+${u.bestStar}</div>
      `;
    }

    // 내 항목 강조
    if (u.nickname === session.nickname) {
      item.style.borderColor = 'var(--accent)';
    }

    item.addEventListener('click', () => openRankProfile(u.userKey));

    list.appendChild(item);
  });

  if (users.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--text-sub); padding:2rem;">아직 랭킹 데이터가 없습니다.</div>';
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── 상대 프로필 모달 ─────────────────────────────────

async function openRankProfile(userKey) {
  if (!userKey) return;
  const res = await apiCall('/api/battle/profile', { opponentKey: userKey });
  if (!res.ok) { showToast(res.error || '프로필을 불러오지 못했습니다.'); return; }

  const stage = resolveStage(res.currentStar, res.track) || COMMON_STAGES[0];
  document.getElementById('profile-star-level').textContent = `+${res.currentStar}강`;
  document.getElementById('profile-nickname').textContent = res.nickname;
  document.getElementById('profile-star-name').textContent = stage.name;
  document.getElementById('profile-star-img').src = starImagePath(res.currentStar, res.track);
  document.getElementById('profile-record').textContent = `배틀 전적 ${res.battleWins}승 ${res.battleLosses}패`;
  document.getElementById('profile-stats').textContent =
    `최고 도달 +${res.bestStar}강 · 강화 시도 ${res.enhanceAttempts}회 · 파괴 ${res.enhanceDestroys}회 · 배틀 ${res.battleWins + res.battleLosses}전 ${res.battleWins}승`;

  const goBtn = document.getElementById('btn-goto-battle');
  const note  = document.getElementById('profile-battle-note');
  if (res.isFriend) {
    goBtn.style.display = '';
    note.style.display  = 'none';
    goBtn.onclick = () => { location.href = `battle.html?with=${encodeURIComponent(userKey)}`; };
  } else {
    goBtn.style.display = 'none';
    note.style.display  = '';
  }

  document.getElementById('profile-modal-bg').classList.add('visible');
}

document.getElementById('profile-modal-close').addEventListener('click', () => {
  document.getElementById('profile-modal-bg').classList.remove('visible');
});

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 2200);
}

document.getElementById('tab-enhance').addEventListener('click', () => {
  if (currentMode === 'enhance') return;
  currentMode = 'enhance';
  document.getElementById('tab-enhance').classList.add('active');
  document.getElementById('tab-battle').classList.remove('active');
  renderRanking(currentMode);
});

document.getElementById('tab-battle').addEventListener('click', () => {
  if (currentMode === 'battle') return;
  currentMode = 'battle';
  document.getElementById('tab-battle').classList.add('active');
  document.getElementById('tab-enhance').classList.remove('active');
  renderRanking(currentMode);
});

(async () => { await renderRanking(currentMode); })();
</script>
</body>
</html>
