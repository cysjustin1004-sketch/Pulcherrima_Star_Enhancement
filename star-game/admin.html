<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>관리자 — 별 강화하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 관리자 비밀번호 입력 화면 -->
<div id="auth-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-title">🔐 관리자</div>
      <div class="login-sub">운영자 전용 페이지</div>
      <div class="form-group">
        <label class="form-label">관리자 비밀번호</label>
        <input type="password" id="admin-pw-input" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <div class="form-error" id="admin-pw-error"></div>
      <button class="btn-primary mt-1" id="btn-admin-login">입장</button>
    </div>
  </div>
</div>

<!-- 관리자 대시보드 (인증 후 표시) -->
<div id="admin-screen" style="display:none;">
  <div class="page">
    <h1 class="page-title">🔐 관리자 패널</h1>

    <!-- 수소 지급 섹션 -->
    <div class="card">
      <div class="card-title">수소 지급</div>
      <div class="form-group">
        <label class="form-label">유저 닉네임</label>
        <input type="text" id="give-nickname" placeholder="닉네임 입력" maxlength="12">
      </div>
      <div class="form-group">
        <label class="form-label">지급할 수소 양</label>
        <input type="number" id="give-amount" placeholder="예: 100000" min="1" max="999999999">
      </div>
      <div class="form-error" id="give-error"></div>
      <button class="btn-success" id="btn-give-hydrogen" style="width:100%; margin-top:0.5rem;">💧 수소 지급</button>
    </div>

    <!-- 유저 목록 -->
    <div class="card">
      <div class="card-title">전체 유저 목록</div>
      <div id="user-list">
        <div style="color:var(--text-sub); font-size:0.9rem;">로딩 중...</div>
      </div>
    </div>

    <!-- 위험 구역: 게임 구조 개편(v2)에 따른 전체 유저 데이터 초기화 -->
    <div class="card" style="border-color:var(--danger);">
      <div class="card-title" style="color:var(--danger);">위험 구역 — 전체 유저 데이터 초기화</div>
      <div style="font-size:0.82rem; color:var(--text-sub); margin-bottom:0.75rem;">
        공통 17단계 + 5트랙 분기 구조(v2)로 게임을 개편하면서 옛 구조로 저장된 유저/로그/비밀번호 데이터를 모두 삭제합니다. 되돌릴 수 없습니다.
      </div>
      <button class="btn-danger" id="btn-wipe-users" style="width:100%;">전체 유저 데이터 삭제</button>
    </div>

    <!-- 강화 로그 조회 -->
    <div class="card" id="log-section" style="display:none;">
      <div class="card-title">강화 로그 — <span id="log-user-name"></span></div>
      <div id="log-list" style="display:flex; flex-direction:column; gap:0.35rem; max-height:300px; overflow-y:auto;"></div>
      <button class="btn-secondary" style="width:100%; margin-top:0.75rem;" id="btn-close-log">닫기</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="game.js"></script>
<script>
// 관리자 세션 토큰 (메모리에만 보관, 페이지 새로고침 시 재인증 필요)
let adminToken = null;

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 2200);
}

// SHA-256 해시 (WebCrypto API)
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('btn-admin-login').addEventListener('click', async () => {
  const pw    = document.getElementById('admin-pw-input').value;
  const errEl = document.getElementById('admin-pw-error');
  errEl.classList.remove('visible');

  if (!pw) {
    errEl.textContent = '비밀번호를 입력하세요.';
    errEl.classList.add('visible');
    return;
  }

  const passwordHash = await sha256(pw);

  const res  = await fetch('/api/admin/verify', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ passwordHash }),
  });
  const data = await res.json();

  if (!data.ok) {
    errEl.textContent = data.error || '인증 실패';
    errEl.classList.add('visible');
    return;
  }

  if (data.firstSetup) showToast('관리자 비밀번호가 설정되었습니다.');
  adminToken = data.token;
  enterAdminPanel();
});

// Enter 키 지원
document.getElementById('admin-pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-admin-login').click();
});

function enterAdminPanel() {
  adminAuthenticated = true;
  document.getElementById('auth-screen').style.display   = 'none';
  document.getElementById('admin-screen').style.display  = '';
  loadUsers();
}

// ─── 유저 목록 로드 ─────────────────────────────────

async function loadUsers() {
  const userList = document.getElementById('user-list');
  userList.innerHTML = '<div style="color:var(--text-sub); font-size:0.9rem;">로딩 중...</div>';

  const snap = await dbGet('users');
  if (!snap) {
    userList.innerHTML = '<div style="color:var(--text-sub); font-size:0.9rem;">유저가 없습니다.</div>';
    return;
  }

  const users = Object.entries(snap)
    .map(([key, data]) => ({ key, ...data }))
    .sort((a, b) => (b.bestStar || 0) - (a.bestStar || 0));

  userList.innerHTML = '';
  users.forEach(user => {
    const row = document.createElement('div');
    row.className = 'admin-user-row';
    const isBanned = !!user.banned;
    row.innerHTML = `
      <div class="admin-user-info">
        <div class="admin-user-nick">${escapeHtml(user.nickname || user.key)}${isBanned ? ' <span style="color:var(--danger);font-size:0.75rem;">[벤]</span>' : ''}</div>
        <div class="admin-user-stat">
          💧 ${formatNumber(user.hydrogen || 0)} · ⭐ +${user.currentStar || 0} · 최고 +${user.bestStar || 0} · 방지권 ${user.protectionScrolls || 0}
        </div>
      </div>
      <div style="display:flex;gap:0.4rem;flex-shrink:0;">
        <button class="btn-outline" style="font-size:0.78rem; padding:0.4rem 0.7rem;">로그</button>
        <button class="${isBanned ? 'btn-secondary' : 'btn-danger'}" style="font-size:0.78rem; padding:0.4rem 0.7rem;">${isBanned ? '벤 해제' : '벤'}</button>
      </div>
    `;

    const [btnLog, btnBan] = row.querySelectorAll('button');
    btnLog.addEventListener('click', () => viewLogs(user.key, user.nickname || user.key));
    btnBan.addEventListener('click', () => toggleBan(user.key, user.nickname || user.key, isBanned));

    userList.appendChild(row);
  });
}

// ─── 강화 로그 조회 ─────────────────────────────────

async function viewLogs(userKey, nickname) {
  const logSection = document.getElementById('log-section');
  const logList    = document.getElementById('log-list');
  document.getElementById('log-user-name').textContent = nickname;
  logList.innerHTML = '<div style="color:var(--text-sub); font-size:0.9rem;">로딩 중...</div>';
  logSection.style.display = '';

  const snap = await dbGet(`enhanceLogs/${userKey}`);
  if (!snap) {
    logList.innerHTML = '<div style="color:var(--text-sub); font-size:0.9rem;">로그 없음</div>';
    return;
  }

  const logs = Object.values(snap).sort((a, b) => b.timeMs - a.timeMs).slice(0, 100);
  logList.innerHTML = '';
  logs.forEach(log => {
    const dt = new Date(log.timeMs).toLocaleString('ko-KR');
    const resultColor = log.result === 'success' ? 'var(--success)' : 'var(--danger)';
    const entry = document.createElement('div');
    entry.style.cssText = 'font-size:0.8rem; padding:0.35rem 0; border-bottom:1px solid var(--border);';
    entry.innerHTML = `
      <span style="color:var(--text-sub);">${dt}</span>
      <span style="margin-left:0.5rem;">+${log.from} → +${log.to}</span>
      <span style="margin-left:0.5rem; color:${resultColor}; font-weight:700;">${log.result === 'success' ? '성공' : '실패'}</span>
      ${log.usedProtection ? '<span style="margin-left:0.3rem; color:var(--blue);">[방지]</span>' : ''}
    `;
    logList.appendChild(entry);
  });
}

document.getElementById('btn-close-log').addEventListener('click', () => {
  document.getElementById('log-section').style.display = 'none';
});

// ─── 수소 지급 ──────────────────────────────────────

document.getElementById('btn-give-hydrogen').addEventListener('click', async () => {
  const nick   = document.getElementById('give-nickname').value.trim();
  const amount = parseInt(document.getElementById('give-amount').value, 10);
  const errEl  = document.getElementById('give-error');
  errEl.classList.remove('visible');

  if (!nick) {
    errEl.textContent = '닉네임을 입력하세요.';
    errEl.classList.add('visible');
    return;
  }
  if (!amount || amount < 1) {
    errEl.textContent = '올바른 수소 양을 입력하세요.';
    errEl.classList.add('visible');
    return;
  }

  const userKey = nick.toLowerCase().replace(/[^a-z0-9가-힣]/g, '_');
  const res = await fetch('/api/admin/give-hydrogen', {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'X-Admin-Token': adminToken || '',
    },
    body: JSON.stringify({ userKey, amount }),
  });
  const data = await res.json();

  if (data.ok) {
    showToast(`${nick}에게 ${formatNumber(amount)} 수소 지급 완료!`);
    document.getElementById('give-nickname').value = '';
    document.getElementById('give-amount').value   = '';
    await loadUsers();
  } else {
    errEl.textContent = data.error || '지급 실패';
    errEl.classList.add('visible');
  }
});

async function toggleBan(userKey, nickname, currentlyBanned) {
  const action = currentlyBanned ? '벤을 해제' : '벤';
  if (!confirm(`${nickname} 님을 ${action}하시겠습니까?`)) return;

  const res = await fetch('/api/admin/ban', {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'X-Admin-Token': adminToken || '',
    },
    body: JSON.stringify({ userKey, banned: !currentlyBanned }),
  });
  const data = await res.json();

  if (data.ok) {
    showToast(`${nickname} ${currentlyBanned ? '벤 해제' : '벤'} 완료`);
    await loadUsers();
  } else {
    showToast(data.error || '처리 실패');
  }
}

// ─── 위험 구역: 전체 유저 데이터 초기화 ─────────────

document.getElementById('btn-wipe-users').addEventListener('click', async () => {
  const phrase = '전체 유저 데이터 삭제';
  const input = prompt(`정말 모든 유저 데이터를 삭제하시겠습니까? 되돌릴 수 없습니다.\n계속하려면 아래에 정확히 입력하세요: ${phrase}`);
  if (input !== phrase) {
    if (input !== null) showToast('확인 문구가 일치하지 않아 취소되었습니다.');
    return;
  }

  const res = await fetch('/api/admin/maintenance', {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'X-Admin-Token': adminToken || '',
    },
    body: JSON.stringify({ action: 'wipe-users', confirm: phrase }),
  });
  const data = await res.json();

  if (data.ok) {
    showToast('전체 유저 데이터가 삭제되었습니다.');
    await loadUsers();
  } else {
    showToast(data.error || '삭제 실패');
  }
});

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
