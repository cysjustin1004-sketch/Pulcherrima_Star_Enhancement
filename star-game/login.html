<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>별 강화하기 — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Sora:wght@700;900&family=Hanken+Grotesk:wght@400;500;700;900&family=Geist:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.4 9.2L22 12L14.4 14.8L12 22L9.6 14.8L2 12L9.6 9.2L12 2Z" fill="black"/>
        </svg>
      </div>
      <div class="login-title">별 강화하기</div>
      <div class="login-sub">초신성부터 빅뱅까지, 별을 강화하세요</div>

      <!-- 탭 -->
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login">로그인</button>
        <button class="tab-btn" id="tab-register">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input type="text" id="login-nickname" placeholder="닉네임 입력" maxlength="12" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password">
        </div>
        <div class="form-check-row">
          <label class="form-check-label">
            <input type="checkbox" id="remember-login">
            로그인 정보 기억하기
          </label>
        </div>
        <div class="form-error" id="login-error"></div>
        <button class="btn-primary mt-1" id="btn-login">로그인</button>
      </div>

      <!-- 회원가입 폼 -->
      <div id="form-register" style="display:none">
        <div class="form-group">
          <label class="form-label">닉네임 (2~12자)</label>
          <input type="text" id="reg-nickname" placeholder="사용할 닉네임 입력" maxlength="12" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">학번 (4자리, 선생님/외부인은 0000)</label>
          <input type="text" id="reg-student-id" placeholder="예: 1305 (1학년 3반 5번)" maxlength="4" inputmode="numeric" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" id="reg-real-name" placeholder="실명 입력" maxlength="20" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">이메일 본인인증</label>
          <div style="display:flex; gap:0.5rem;">
            <input type="email" id="reg-email" placeholder="goedu.kr 형식으로 입력해주세요." style="flex:1;" autocomplete="off">
            <button class="btn-secondary" id="btn-send-code" style="width:auto; flex-shrink:0;">인증 코드 보내기</button>
          </div>
        </div>
        <div class="form-group" id="email-code-group" style="display:none;">
          <div style="display:flex; gap:0.5rem;">
            <input type="text" id="reg-email-code" placeholder="6자리 코드 입력" maxlength="6" inputmode="numeric" style="flex:1;">
            <button class="btn-secondary" id="btn-verify-code" style="width:auto; flex-shrink:0;">확인</button>
          </div>
        </div>
        <div id="email-status" style="font-size:0.82rem; margin:-0.4rem 0 0.9rem; color:var(--text-sub);"></div>
        <div class="form-group">
          <label class="form-label">비밀번호 (4자 이상)</label>
          <input type="password" id="reg-password" placeholder="비밀번호 입력" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <input type="password" id="reg-password2" placeholder="비밀번호 재입력" autocomplete="new-password">
        </div>
        <div class="form-error" id="reg-error"></div>
        <button class="btn-primary mt-1" id="btn-register">회원가입</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="config.js"></script>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
  <script>
    // 이미 로그인된 경우 메인으로 이동
    if (getSession()) window.location.href = 'index.html';

    // 기억된 닉네임 자동 채움 (비밀번호는 저장하지 않음)
    (() => {
      const remembered = getRememberedLogin();
      if (remembered) {
        document.getElementById('login-nickname').value = remembered.nickname;
        document.getElementById('remember-login').checked = true;
        document.getElementById('login-password').focus();
      }
    })();

    const tabLogin    = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const formLogin   = document.getElementById('form-login');
    const formReg     = document.getElementById('form-register');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      formLogin.style.display = '';
      formReg.style.display = 'none';
    });

    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      formReg.style.display = '';
      formLogin.style.display = 'none';
    });

    // 로그인
    document.getElementById('btn-login').addEventListener('click', async () => {
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('login-error');
      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = '로그인 중...';

      const nickname = document.getElementById('login-nickname').value;

      const result = await login(
        nickname,
        document.getElementById('login-password').value
      );

      if (result.ok) {
        if (document.getElementById('remember-login').checked) {
          saveRememberedLogin({ nickname: nickname.trim() });
        } else {
          clearRememberedLogin();
        }
        window.location.href = 'index.html';
      } else {
        errEl.textContent = result.error;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });

    // Enter 키
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // ─── 이메일 본인인증 ───────────────────────────────

    let emailVerified = false;
    let resendTimer = null;

    const emailInput   = document.getElementById('reg-email');
    const codeGroup     = document.getElementById('email-code-group');
    const codeInput     = document.getElementById('reg-email-code');
    const btnSendCode   = document.getElementById('btn-send-code');
    const btnVerifyCode = document.getElementById('btn-verify-code');
    const emailStatus   = document.getElementById('email-status');
    const btnRegister   = document.getElementById('btn-register');

    function resetEmailVerification() {
      emailVerified = false;
      btnRegister.disabled = true;
      codeGroup.style.display = 'none';
      codeInput.value = '';
      emailStatus.textContent = '';
      emailStatus.style.color = 'var(--text-sub)';
    }
    resetEmailVerification();

    emailInput.addEventListener('input', () => {
      if (emailVerified) resetEmailVerification();
    });

    function startResendCountdown() {
      let remaining = 60;
      btnSendCode.disabled = true;
      btnSendCode.textContent = `인증 코드 보내기 (${remaining})`;
      resendTimer = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(resendTimer);
          btnSendCode.disabled = false;
          btnSendCode.textContent = '인증 코드 보내기';
        } else {
          btnSendCode.textContent = `인증 코드 보내기 (${remaining})`;
        }
      }, 1000);
    }

    btnSendCode.addEventListener('click', async () => {
      emailStatus.style.color = 'var(--text-sub)';
      emailStatus.textContent = '발송 중...';
      btnSendCode.disabled = true;

      const result = await sendEmailCode(emailInput.value);

      if (result.ok) {
        codeGroup.style.display = '';
        emailStatus.textContent = '코드를 이메일로 보냈습니다.';
        startResendCountdown();
      } else {
        emailStatus.style.color = 'var(--danger)';
        emailStatus.textContent = result.error;
        btnSendCode.disabled = false;
      }
    });

    btnVerifyCode.addEventListener('click', async () => {
      const result = await verifyEmailCode(emailInput.value, codeInput.value);

      if (result.ok) {
        emailVerified = true;
        emailInput.disabled = true;
        codeInput.disabled = true;
        btnSendCode.disabled = true;
        btnVerifyCode.disabled = true;
        if (resendTimer) clearInterval(resendTimer);
        emailStatus.style.color = 'var(--success)';
        emailStatus.textContent = '✓ 본인인증 완료';
        btnRegister.disabled = false;
      } else {
        emailStatus.style.color = 'var(--danger)';
        emailStatus.textContent = result.error;
      }
    });

    // 회원가입
    btnRegister.addEventListener('click', async () => {
      const btn = btnRegister;
      const errEl = document.getElementById('reg-error');
      errEl.classList.remove('visible');

      if (!emailVerified) {
        errEl.textContent = '이메일 본인인증을 완료해주세요.';
        errEl.classList.add('visible');
        return;
      }

      const pw  = document.getElementById('reg-password').value;
      const pw2 = document.getElementById('reg-password2').value;
      if (pw !== pw2) {
        errEl.textContent = '비밀번호가 일치하지 않습니다.';
        errEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = '가입 중...';

      const result = await register(
        document.getElementById('reg-nickname').value,
        document.getElementById('reg-student-id').value,
        document.getElementById('reg-real-name').value,
        pw,
        emailInput.value
      );

      if (result.ok) {
        window.location.href = 'index.html';
      } else {
        errEl.textContent = result.error;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = '회원가입';
      }
    });
  </script>
</body>
</html>
