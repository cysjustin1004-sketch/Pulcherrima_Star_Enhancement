<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>인벤토리 — 별 강화하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Sora:wght@700;900&family=Hanken+Grotesk:wght@400;500;700;900&family=Geist:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-header">
  <div class="top-header-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L14.4 9.2L22 12L14.4 14.8L12 22L9.6 14.8L2 12L9.6 9.2L12 2Z" fill="black"/>
    </svg>
  </div>
  <div class="top-header-title">인벤토리</div>
</div>

<div class="page">

  <!-- 보유 아이템 -->
  <section class="inv-section">
    <div class="inv-section-head">
      <span class="inv-section-title">보유 아이템</span>
      <span class="inv-section-count" id="inventory-count">-</span>
    </div>
    <div class="item-slot-grid" id="inventory-list"></div>
  </section>

  <!-- 보관된 별 -->
  <section class="inv-section">
    <div class="inv-section-head">
      <span class="inv-section-title">보관된 별</span>
      <span class="inv-section-count" id="stored-stars-count">-</span>
    </div>
    <div class="item-slot-grid" id="stored-stars-list"></div>
  </section>

  <!-- 레시피 목록 -->
  <div class="card-title" style="padding:0.25rem 0 0.5rem;">레시피</div>
  <div id="recipe-list"></div>
</div>

<!-- 하단 네비게이션 -->
<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <span class="nav-icon">⭐</span>강화
  </a>
  <a class="nav-item" href="codex.html">
    <span class="nav-icon">📖</span>도감
  </a>
  <a class="nav-item" href="ranking.html">
    <span class="nav-icon">🏆</span>랭킹
  </a>
  <a class="nav-item" href="messages.html">
    <span class="nav-icon">💬</span>메시지
  </a>
  <a class="nav-item" href="battle.html">
    <span class="nav-icon">⚔</span>배틀
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="game.js"></script>
<script>
const session = requireAuth();
if (!session) throw new Error('no session');

let currentUser = null;

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 2200);
}

function formatOutputDesc(output) {
  if (output.type === 'protection') return `붕괴 방지권 ${output.amount}개`;
  if (output.type === 'star') {
    // trackRelative 레시피는 절대 레벨이 없으므로 14+N으로 먼저 계산.
    // 트랙은 조합할 때 서버가 무작위로 정하므로 미리보기에서는 특정 이름을 보여줄 수 없다.
    const level = output.trackRelative != null ? 14 + output.trackRelative : output.level;
    if (output.trackRelative != null) {
      return `무작위 트랙(+${level}강) 별 1개`;
    }
    const stage = resolveStage(level, null);
    const name  = stage ? stage.name : '';
    return `${name}(+${level}강) 별 1개`;
  }
  return '?';
}

function renderAll(user) {
  currentUser = user;

  // ── 인벤토리 표시 (슬롯 그리드) ──
  const invList = document.getElementById('inventory-list');
  invList.innerHTML = '';
  let heldCount = 0;
  Object.entries(ITEM_NAMES).forEach(([key, name]) => {
    const count = (user.items && user.items[key]) || 0;
    if (count > 0) heldCount++;

    const slot = document.createElement('div');
    slot.className = 'item-slot' + (count === 0 ? ' empty' : '');
    slot.innerHTML = `
      <div class="item-slot-name">${name}</div>
      <div class="item-slot-count">${count}개</div>
    `;
    invList.appendChild(slot);
  });
  document.getElementById('inventory-count').textContent =
    `${heldCount} / ${Object.keys(ITEM_NAMES).length}`;

  // ── 보관된 별 (슬롯 그리드) ──
  const starList = document.getElementById('stored-stars-list');
  starList.innerHTML = '';
  const stored = user.storedStars || {};
  const storedEntries = Object.entries(stored)
    .filter(([, cnt]) => cnt > 0)
    .sort(([keyA], [keyB]) => parseStageKey(keyB).level - parseStageKey(keyA).level);
  const totalStoredCount = storedEntries.reduce((sum, [, cnt]) => sum + cnt, 0);
  document.getElementById('stored-stars-count').textContent = `${totalStoredCount} / ${INVENTORY_CAP}`;

  if (storedEntries.length === 0) {
    starList.innerHTML = '<div class="inv-empty-note">보관된 별이 없습니다.</div>';
  } else {
    storedEntries.forEach(([key, cnt]) => {
      const { level, track } = parseStageKey(key);
      const stage = resolveStage(level, track);
      // 재료 소모는 트랙 무관 풀링(sumStoredStarAcrossTracks)이라, 이 별이 실제로
      // 소모될 곳은 이 별 "자신의" 트랙이 아니라 내 계정이 실제로 밟고 있는
      // currentUser.track의 상위 강화 단계다 — 별의 트랙(track)을 넘기면
      // 크래프팅/이전 워프로 다른 트랙 별을 보관 중일 때 엉뚱한 안내가 뜬다.
      const usage = starMaterialUsage(level, currentUser.track);
      const canSell = stage && stage.sellPrice;
      const slot = document.createElement('div');
      slot.className = 'item-slot' + (usage.length ? ' material' : '');
      slot.innerHTML = `
        <div class="item-slot-badge">+${level}</div>
        <img class="item-slot-img" src="${starImagePath(level, track)}" alt="">
        <div class="item-slot-name">${stage ? stage.name : '?'}</div>
        ${track ? `<div class="item-slot-track">(${TRACK_INFO[track].name})</div>` : ''}
        <div class="item-slot-count">${cnt}개</div>
        ${usage.length ? `<div class="material-usage-note">${usage[0]} 재료</div>` : ''}
        <div class="item-slot-actions" style="display:flex; flex-direction:column; gap:0.25rem; margin-top:0.4rem; width:100%;">
          <button class="btn-secondary item-slot-load" style="width:100%; font-size:0.68rem; padding:0.3rem 0.2rem;">불러오기</button>
          ${canSell ? `<button class="btn-secondary item-slot-sell" style="width:100%; font-size:0.68rem; padding:0.3rem 0.2rem;">판매 (${formatKoreanNumber(stage.sellPrice)})</button>` : ''}
        </div>
      `;
      slot.querySelector('.item-slot-load').addEventListener('click', () => handleLoadStored(key, stage));
      if (canSell) {
        slot.querySelector('.item-slot-sell').addEventListener('click', () => handleSellStored(key, stage));
      }
      starList.appendChild(slot);
    });
  }

  // ── 레시피 목록 ──
  const recipeList = document.getElementById('recipe-list');
  recipeList.innerHTML = '';
  RECIPES.forEach(recipe => {
    const canCraft = recipe.inputs.every(inp => {
      const held = (user.items && user.items[inp.key]) || 0;
      return held >= inp.amount;
    });

    const card = document.createElement('div');
    card.className = 'card';
    const inputText = recipe.inputs.map(inp =>
      `${ITEM_NAMES[inp.key]} ${inp.amount}개`
    ).join(' + ');

    card.innerHTML = `
      <div style="font-size:0.88rem; color:var(--text-sub); margin-bottom:0.4rem;">${inputText}</div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:0.95rem; font-weight:700; color:var(--accent);">→ ${formatOutputDesc(recipe.output)}</div>
        <button class="btn-success" style="font-size:0.85rem; padding:0.5rem 0.9rem;" data-id="${recipe.id}" ${canCraft ? '' : 'disabled'}>
          조합
        </button>
      </div>
    `;

    card.querySelector('button').addEventListener('click', () => handleCraft(recipe));
    recipeList.appendChild(card);
  });
}

async function handleCraft(recipe) {
  if (!currentUser) return;

  const token = getToken();
  const res = await fetch('/api/combine/craft', {
    method:  'POST',
    headers: {
      'Content-Type':    'application/json',
      'X-Session-Token': token || '',
    },
    body: JSON.stringify({ recipeId: recipe.id }),
  });
  const data = await res.json();

  if (data.ok) {
    const out = data.output;
    if (out.type === 'protection') {
      showToast(`붕괴 방지권 ${out.amount}개 획득!`);
    } else if (out.type === 'star') {
      const stage = resolveStage(out.level, out.track);
      showToast(`${stage ? stage.name : `+${out.level}강`}(+${out.level}강) 별 1개 획득!`);
    }
    await reload();
  } else {
    showToast(data.error || '조합 실패');
  }
}

async function handleSellStored(key, stage) {
  const result = await sellStoredStar(key);
  if (result.ok) {
    showToast(`${stage.name} 판매! 수소 ${formatNumber(result.gained)} 획득`);
    await reload();
  } else {
    showToast(result.error || '판매 실패');
  }
}

async function handleLoadStored(key, stage) {
  const result = await loadStoredStar(key);
  if (result.ok) {
    // 강화 화면에서 바로 이어서 강화할 수 있도록 이동
    location.href = 'index.html';
  } else {
    showToast(result.error || '불러오기 실패');
  }
}

async function reload() {
  const user = await loadCurrentUser();
  if (!user) { clearSession(); location.href = 'login.html'; return; }
  renderAll(user);
}

(async () => { await reload(); })();
</script>
</body>
</html>
